<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Orders - Admin</title>
<link rel="stylesheet" href="styles.css">

<style>
.admin-container {
max-width: 1400px;
margin: 0 auto;
padding: 20px;
background: #f5f5f5;
min-height: 100vh;
}

.admin-header {
background: white;
padding: 20px;
border-radius: 12px;
margin-bottom: 20px;
}

.admin-header h1 {
font-size: 24px;
color: #2D8B3C;
}

.orders-table {
background: white;
border-radius: 12px;
overflow: hidden;
}

table {
width: 100%;
border-collapse: collapse;
}

thead {
background: #f5f5f5;
}

th {
padding: 15px;
text-align: left;
font-weight: 600;
font-size: 14px;
}

td {
padding: 15px;
border-bottom: 1px solid #f0f0f0;
font-size: 14px;
}

tr:hover {
background: #f9f9f9;
cursor:pointer;
}
</style>

</head>

<body>

<div class="admin-container">

<div class="admin-header">
<a href="admin-dashboard.html" style="text-decoration:none;color:#666;font-size:14px;">
← Back to Dashboard
</a>
<h1>📋 Customer Orders</h1>
</div>

<div class="orders-table">

<table>

<thead>
<tr>
<th>Customer ID</th>
<th>Customer Name</th>
<th>Shop Name</th>
<th>Total Items Ordered</th>
</tr>
</thead>

<tbody id="ordersTableBody">
</tbody>

</table>

</div>

</div>


<script>

// Dummy order data
const orders = [

{customerId:"C001",customer:"Ramesh Kumar",shop:"Sri Lakshmi Stores",product:"Rice",quantity:3},
{customerId:"C001",customer:"Ramesh Kumar",shop:"Sri Lakshmi Stores",product:"Sugar",quantity:2},

{customerId:"C002",customer:"Suresh Patel",shop:"New Bharat Store",product:"Rice",quantity:5},
{customerId:"C002",customer:"Suresh Patel",shop:"New Bharat Store",product:"Oil",quantity:3},

{customerId:"C003",customer:"Kumar Swamy",shop:"Tamil Nadu Traders",product:"Rice",quantity:4},
{customerId:"C003",customer:"Kumar Swamy",shop:"Tamil Nadu Traders",product:"Dal",quantity:1}

];

// Group orders by customer
const customers = {};

orders.forEach(order => {

if(!customers[order.customerId]){

customers[order.customerId] = {
name: order.customer,
shop: order.shop,
total: 0
};

}

customers[order.customerId].total += order.quantity;

});


const tableBody = document.getElementById("ordersTableBody");

// Display customers
for(let id in customers){

const row = document.createElement("tr");

row.innerHTML = `
<td><strong>${id}</strong></td>
<td>${customers[id].name}</td>
<td>${customers[id].shop}</td>
<td><strong>${customers[id].total}</strong></td>
`;

row.onclick = function(){

window.location.href =
"admin-customer-items.html?customer=" + id;

};

tableBody.appendChild(row);

}

</script>

</body>

</html>
