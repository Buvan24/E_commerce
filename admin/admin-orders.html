<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Details - Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f4f6f9;
  min-height: 100vh;
  padding: 24px;
}

.container {
  max-width: 1300px;
  margin: auto;
}

.page-header {
  background: white;
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.page-header a {
  text-decoration: none;
  color: #666;
  font-size: 13px;
}

.page-header h1 {
  font-size: 22px;
  color: #2D8B3C;
  margin-top: 8px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

thead tr {
  background: #2c3e50;
  color: white;
}

th {
  padding: 13px 16px;
  text-align: left;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

td {
  padding: 14px 16px;
  font-size: 13.5px;
  border-bottom: 1px solid #f0f0f0;
  vertical-align: middle;
  color: #333;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #f8faff; }

.cid {
  font-weight: 700;
  color: #2c3e50;
}

.phone { color: #555; }

.badge-orders {
  display: inline-block;
  background: #1a6fc4;
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  text-decoration: none;
}

.badge-orders:hover { background: #145ea8; }

.badge-zero {
  display: inline-block;
  background: #e0e0e0;
  color: #999;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
}

.history-btn {
  display: inline-block;
  background: #f0f4ff;
  color: #3a5bd9;
  border: 1px solid #c5d0f5;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.history-btn:hover { background: #dde6ff; }

.no-history {
  color: #bbb;
  font-size: 12px;
}

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal {
  background: white;
  border-radius: 14px;
  width: 540px;
  max-width: 95vw;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  animation: popIn 0.2s ease;
}

@keyframes popIn {
  from { transform: scale(0.92); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}

.modal-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid #eee;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-header h2 { font-size: 17px; color: #2c3e50; }

.modal-close {
  background: none;
  border: none;
  font-size: 22px;
  color: #888;
  cursor: pointer;
  line-height: 1;
}

.modal-close:hover { color: #333; }

.modal-body { padding: 18px 22px 22px; }

.modal-body table { font-size: 13px; }
.modal-body th {
  background: #f5f5f5;
  color: #444;
  padding: 9px 12px;
  font-size: 12px;
}
.modal-body td {
  padding: 9px 12px;
  border-bottom: 1px solid #f5f5f5;
}

.pill {
  display: inline-block;
  background: #e8f5e9;
  color: #2D8B3C;
  padding: 2px 9px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
}

.pill-blue {
  background: #e3f0ff;
  color: #1a6fc4;
}

.empty-msg {
  text-align: center;
  padding: 30px;
  color: #aaa;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">

  <div class="page-header">
    <a href="admin-dashboard.html">← Back to Dashboard</a>
    <h1>👤 Customer Details</h1>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Customer ID</th>
          <th>Customer Name</th>
          <th>Shop Name</th>
          <th>Address</th>
          <th>Phone Number</th>
          <th>Items Ordered</th>
          <th>Order History</th>
        </tr>
      </thead>
      <tbody id="customerTableBody"></tbody>
    </table>
  </div>

</div>

<!-- Product Details Modal -->
<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Current Order</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- History Modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="historyTitle">Order History</h2>
      <button class="modal-close" onclick="closeHistory()">×</button>
    </div>
    <div class="modal-body" id="historyBody"></div>
  </div>
</div>

<script>

// ─── Customer master data ───────────────────────────────────────────────────
const customers = [
  { id:"C001", name:"Ramesh Kumar",   shop:"Sri Lakshmi Stores",    address:"12, Anna Nagar, Salem",          phone:"9876543210" },
  { id:"C002", name:"Suresh Patel",   shop:"New Bharat Store",       address:"45, Gandhi Road, Erode",         phone:"9865432109" },
  { id:"C003", name:"Kumar Swamy",    shop:"Tamil Nadu Traders",     address:"78, Market Street, Coimbatore",  phone:"9754321098" },
  { id:"C004", name:"Priya Devi",     shop:"Priya General Stores",   address:"23, Nehru Street, Tirupur",      phone:"9643210987" },
  { id:"C005", name:"Muthu Rajan",    shop:"Muthu Provision Store",  address:"56, RS Puram, Coimbatore",       phone:"9532109876" },
  { id:"C006", name:"Lakshmi Bai",    shop:"Lakshmi Traders",        address:"11, Kovai Road, Pollachi",       phone:"9421098765" },
  { id:"C007", name:"Arjun Sharma",   shop:"Arjun Kirana",           address:"34, Raja Street, Namakkal",      phone:"—"          },
  { id:"C008", name:"Geetha Devi",    shop:"Geetha Stores",          address:"67, KK Nagar, Salem",            phone:"9309876543" },
  { id:"C009", name:"Selvam Kumar",   shop:"Selvam Provision",       address:"90, Omalur Road, Salem",         phone:"9198765432" },
];

// ─── Today's current orders ─────────────────────────────────────────────────
const currentOrders = {
  "C001": [
    { product:"Rice",  qty:3, unit:"kg", price:52, total:156 },
    { product:"Sugar", qty:2, unit:"kg", price:45, total:90  },
  ],
  "C002": [
    { product:"Rice",  qty:5, unit:"kg", price:52, total:260 },
    { product:"Oil",   qty:3, unit:"L",  price:130,total:390 },
    { product:"Sugar", qty:2, unit:"kg", price:45, total:90  },
  ],
  "C003": [
    { product:"Rice",  qty:4, unit:"kg", price:52, total:208 },
    { product:"Dal",   qty:1, unit:"kg", price:95, total:95  },
  ],
  "C004": [
    { product:"Wheat Flour", qty:2, unit:"kg", price:40, total:80 },
    { product:"Salt",        qty:3, unit:"kg", price:18, total:54 },
  ],
  "C005": [
    { product:"Rice", qty:10, unit:"kg", price:52, total:520 },
  ],
  // C006, C007, C008 → no current orders (empty)
  "C009": [
    { product:"Oil",  qty:5, unit:"L",  price:130, total:650 },
    { product:"Rice", qty:2, unit:"kg", price:52,  total:104 },
  ],
};

// ─── Order history (past orders) ────────────────────────────────────────────
const orderHistory = {
  "C001": [
    { date:"10 Jun 2026", items:["Rice 5kg","Oil 2L"],         total:"₹480" },
    { date:"28 May 2026", items:["Sugar 3kg","Dal 1kg"],       total:"₹230" },
  ],
  "C002": [
    { date:"12 Jun 2026", items:["Rice 4kg","Sugar 2kg"],      total:"₹298" },
    { date:"01 Jun 2026", items:["Oil 5L"],                    total:"₹650" },
    { date:"15 May 2026", items:["Rice 6kg","Wheat 2kg"],      total:"₹392" },
  ],
  "C003": [
    { date:"08 Jun 2026", items:["Rice 3kg","Salt 2kg"],       total:"₹192" },
  ],
  "C005": [
    { date:"11 Jun 2026", items:["Rice 8kg","Dal 2kg"],        total:"₹606" },
    { date:"20 May 2026", items:["Oil 3L"],                    total:"₹390" },
  ],
  "C008": [
    { date:"05 Jun 2026", items:["Sugar 5kg","Rice 2kg"],      total:"₹329" },
  ],
  "C009": [
    { date:"14 Jun 2026", items:["Rice 10kg"],                 total:"₹520" },
  ],
};

// ─── Render table ────────────────────────────────────────────────────────────
const tbody = document.getElementById("customerTableBody");

customers.forEach(c => {
  const orders = currentOrders[c.id] || [];
  const history = orderHistory[c.id] || [];
  const itemCount = orders.length;

  const tr = document.createElement("tr");

  // Items ordered badge
  let itemCell;
  if (itemCount === 0) {
    itemCell = `<span class="badge-zero">0</span>`;
  } else {
    itemCell = `<span class="badge-orders" onclick="showOrders('${c.id}','${c.name}')">${itemCount} items</span>`;
  }

  // History button
  let histCell;
  if (history.length === 0) {
    histCell = `<span class="no-history">No history</span>`;
  } else {
    histCell = `<span class="history-btn" onclick="showHistory('${c.id}','${c.name}')">📋 ${history.length} order${history.length > 1 ? "s" : ""}</span>`;
  }

  tr.innerHTML = `
    <td class="cid">${c.id}</td>
    <td>${c.name}</td>
    <td>${c.shop}</td>
    <td>${c.address}</td>
    <td class="phone">${c.phone}</td>
    <td>${itemCell}</td>
    <td>${histCell}</td>
  `;

  tbody.appendChild(tr);
});

// ─── Current order modal ─────────────────────────────────────────────────────
function showOrders(id, name) {
  const orders = currentOrders[id] || [];
  document.getElementById("modalTitle").textContent = `🛒 Today's Order — ${name} (${id})`;

  let grandTotal = 0;
  let rows = orders.map(o => {
    grandTotal += o.total;
    return `<tr>
      <td>${o.product}</td>
      <td>${o.qty} ${o.unit}</td>
      <td>₹${o.price}/${o.unit}</td>
      <td><span class="pill">₹${o.total}</span></td>
    </tr>`;
  }).join("");

  document.getElementById("modalBody").innerHTML = `
    <table>
      <thead><tr>
        <th>Product</th><th>Quantity</th><th>Unit Price</th><th>Amount</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="text-align:right;margin-top:14px;font-weight:700;font-size:15px;color:#2c3e50;">
      Grand Total: <span style="color:#2D8B3C;">₹${grandTotal}</span>
    </div>`;

  document.getElementById("orderModal").classList.add("active");
}

function closeModal() {
  document.getElementById("orderModal").classList.remove("active");
}

// ─── History modal ───────────────────────────────────────────────────────────
function showHistory(id, name) {
  const history = orderHistory[id] || [];
  document.getElementById("historyTitle").textContent = `📋 Order History — ${name} (${id})`;

  if (history.length === 0) {
    document.getElementById("historyBody").innerHTML = `<p class="empty-msg">No previous orders found.</p>`;
  } else {
    let rows = history.map(h => `
      <tr>
        <td>${h.date}</td>
        <td>${h.items.join(", ")}</td>
        <td><span class="pill pill-blue">${h.total}</span></td>
      </tr>`).join("");

    document.getElementById("historyBody").innerHTML = `
      <table>
        <thead><tr>
          <th>Date</th><th>Items</th><th>Total</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  document.getElementById("historyModal").classList.add("active");
}

function closeHistory() {
  document.getElementById("historyModal").classList.remove("active");
}

// Close modals on overlay click
document.getElementById("orderModal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});
document.getElementById("historyModal").addEventListener("click", function(e) {
  if (e.target === this) closeHistory();
});

</script>
</body>
</html>
